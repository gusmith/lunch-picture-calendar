name               = "lunch-calendar-worker"
main               = "worker.js"
compatibility_date = "2024-09-23"

# ── R2 bucket ────────────────────────────────────────────────────────────────
# No bucket_name needed — Wrangler 4 auto-provisions it on first deploy.
[[r2_buckets]]
binding = "PHOTOS_BUCKET"

# ── D1 database ──────────────────────────────────────────────────────────────
# No database_id needed — Wrangler 4 auto-provisions it on first deploy
# and writes the ID back to this file automatically.
[[d1_databases]]
binding       = "DB"
database_name = "lunch-calendar"
